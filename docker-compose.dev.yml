services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./:/app
      - /app/node_modules
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "1"
    ports:
      - "3000:3000"
