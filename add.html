<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>添加设备 · Things Terminal</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="main.js"></script>
  </head>
  <body>
    <div class="bg-aurora" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <div class="page">
      <header class="nav window">
        <div class="title-bar">
          <div class="title-bar-text">Things Terminal DEVICE ARCHIVE</div>
          <div class="title-bar-controls">
            <button aria-label="Minimize"></button>
            <button aria-label="Maximize"></button>
            <button aria-label="Close"></button>
          </div>
        </div>
        <div class="window-body">
          <menu class="menu" role="menubar">
            <li role="menuitem"><button type="button" data-nav="index.html">展示</button></li>
            <li role="menuitem"><button type="button" data-nav="browse.html">搜索/筛选</button></li>
            <li role="menuitem"><button class="is-active" type="button" data-nav="add.html">添加</button></li>
            <li role="menuitem"><button type="button" data-nav="stats.html">统计</button></li>
            <li role="menuitem"><button type="button" data-nav="admin.html">管理</button></li>
          </menu>
        </div>
      </header>

      <main>
        <section class="window">
          <div class="title-bar">
            <div class="title-bar-text">添加设备</div>
            <div class="title-bar-controls">
              <button aria-label="Minimize"></button>
              <button aria-label="Maximize"></button>
              <button aria-label="Close"></button>
            </div>
          </div>
          <div class="window-body">
            <section class="section add-layout">
              <form class="form" data-add-form>
                <div class="auth-banner">
                  <label>
                    管理密码
                    <input name="adminPassword" data-admin-password type="password" placeholder="如启用管理密码请填写" />
                  </label>
                  <p class="form__status" data-auth-note></p>
                </div>
                <label>
                  设备名称
                  <input name="name" type="text" placeholder="例如：Fujifilm X100VI" />
                </label>
                <label>
                  分类
                  <select class="native-select" name="category" data-category-select></select>
                </label>
                <label>
                  品牌
                  <input name="brand" type="text" placeholder="例如：Sony / Apple" />
                </label>
                <label>
                  状态
                  <select class="native-select" name="status">
                    <option value="active">使用中</option>
                    <option value="deleted">已失去</option>
                  </select>
                </label>
                <label>
                  设备图片路径
                  <input name="imagePath" type="text" placeholder="/res/items_pic/xxx.jpg" />
                </label>
                <div class="upload-row">
                  <label>
                    上传图片
                    <input name="imageFile" data-image-file type="file" accept="image/*" />
                  </label>
                  <button type="button" data-upload-btn>上传到服务器</button>
                  <span class="form__status" data-upload-status></span>
                </div>
                <label>
                  入手时间
                  <input name="acquired" type="month" />
                </label>
                <label>
                  买入价格
                  <div class="price-input">
                    <input name="buyPrice" type="number" min="0" step="0.01" placeholder="例如：220" />
                    <select name="buyCurrency">
                      <option value="CNY">￥ 人民币</option>
                      <option value="USD">$ 美元</option>
                      <option value="GBP">£ 英镑</option>
                      <option value="EUR">€ 欧元</option>
                      <option value="HKD">HK$ 港币</option>
                      <option value="JPY">¥ 日元</option>
                    </select>
                  </div>
                </label>
                <label>
                  入手地点
                  <input name="acquiredLocation" type="text" placeholder="例如：London" />
                </label>
                <label>
                  失去时间
                  <input name="lost" type="month" />
                </label>
                <label>
                  卖出价格
                  <div class="price-input">
                    <input name="sellPrice" type="number" min="0" step="0.01" placeholder="例如：3000" />
                    <select name="sellCurrency">
                      <option value="CNY">￥ 人民币</option>
                      <option value="USD">$ 美元</option>
                      <option value="GBP">£ 英镑</option>
                      <option value="EUR">€ 欧元</option>
                      <option value="HKD">HK$ 港币</option>
                      <option value="JPY">¥ 日元</option>
                    </select>
                  </div>
                </label>
                <label>
                  失去地点
                  <input name="lostLocation" type="text" placeholder="例如：Shanghai" />
                </label>
                <label>
                  归属/父级
                  <input name="parent" type="text" placeholder="例如：Lens Collection" />
                </label>
                <label>
                  备注
                  <textarea name="acquiredTip" rows="3" placeholder="购买渠道、价格、故事等"></textarea>
                </label>
                <label>
                  规格（每行一条）
                  <textarea name="specs" rows="4" placeholder="例如：Apple A15 Bionic"></textarea>
                </label>
                <div class="form__actions">
                  <button type="submit">保存到数据库</button>
                  <span class="form__status" data-save-status></span>
                </div>
              </form>

              <div class="preview">
                <div class="preview__header">
                  <h2>预览</h2>
                  <button data-copy>复制 JSON</button>
                </div>
                <div class="preview__card" data-add-preview></div>
                <pre class="preview__code" data-add-output></pre>
              </div>
            </section>
          </div>
        </section>
      </main>

    </div>
  </body>
</html>
